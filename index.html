<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Chat App</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>

        <!-- Login Screen -->
         <div id="login-screen">
            <div class="login-box">
                <h1>💬 ChatApp</h1>
                <input type="text" id="username-input" placeholder="Enter Your Name..." maxlength="20"/>
                <button id="join-btn">Join Chat</button>
            </div>
         </div>
         <!-- Chat Screen -->
          <div id="chat-screen" class="hidden">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>💬 ChatApp</h2>
                    <span id="online-count">0</span>
                </div>
                <div class="rooms-label">Rooms</div>
                <ui id="rooms-list">
                    <li class="room-active" data-room="general">🌐 General</li>
                    <li class="room" data-room="random">🎲 Random</li>
                    <li class="room" data-room="tech">💻 Tech</li>
                </ui>
                <div class="user-info">
                    <span id="current-user-label"></span>
                    <button id="logout-btn">Leave</button>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <span id="room-title">#General</span>
                    <span id="typing-indicator"></span>
                </div>
                <div id="messages"></div>
                <div id="input-area">
                    <input type="text" id="message-input" placeholder="Type A Message..." maxlength="500"/>
                    <button id="send-btn">Send</button>
                </div>
            </div>
          </div>
          <!-- Firebase SDKs (compat version — easiest for 3-file setup) -->
           <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
           <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
           <script src="script.js"></script>
    </body>
</html>
